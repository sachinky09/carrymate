version: "3.9"

services:
  backend:
    build: ./backend
    container_name: carrymate-backend
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    networks:
      - carrymate-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: carrymate-frontend
    env_file: ./frontend/.env
    networks:
      - carrymate-net
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: carrymate-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - carrymate-net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  carrymate-net:
    driver: bridge
