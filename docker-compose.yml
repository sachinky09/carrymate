version: "3.9"

services:
backend:
build:
context: ./backend
container_name: carrymate-backend
env_file:
- ./backend/.env
expose:
- "5000"
restart: unless-stopped
networks:
- carrymate-net

frontend:
build:
context: ./frontend
container_name: carrymate-frontend
restart: unless-stopped
depends_on:
- backend
networks:
- carrymate-net

nginx:
image: nginx:alpine
container_name: carrymate-nginx
ports:
- "80:80"
volumes:
- ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
restart: unless-stopped
depends_on:
- backend
- frontend
networks:
- carrymate-net

networks:
carrymate-net:
driver: bridge
